name: CI
on:
  push:
    branches: [main, "codex/**"]
  pull_request:
jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env: { POSTGRES_DB: inversiones_test, POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres }
        ports: ["5432:5432"]
        options: --health-cmd "pg_isready -U postgres -d inversiones_test" --health-interval 10s --health-timeout 5s --health-retries 5
    defaults: { run: { working-directory: backend } }
    env:
      SECRET_KEY: ci-only-secret-key-with-more-than-fifty-characters-123456789
      DEBUG: "False"
      ALLOWED_HOSTS: localhost
      DB_NAME: inversiones_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      CSRF_TRUSTED_ORIGINS: http://localhost:5173
      EMAIL_BACKEND: django.core.mail.backends.locmem.EmailBackend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13", cache: pip, cache-dependency-path: backend/requirements.txt }
      - run: pip install -r requirements.txt
      - run: python manage.py makemigrations --check --dry-run
      - run: python manage.py test
      - run: python manage.py check
  frontend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "24", cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
        env: { VITE_API_URL: /api }
  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose --env-file .env.lightsail.example config --quiet
        env: { APP_ENV_FILE: .env.lightsail.example }
      - run: docker run --rm -v "$PWD/Caddyfile:/etc/caddy/Caddyfile:ro" -e APP_DOMAIN=inversionescahuana.com caddy:2-alpine caddy validate --config /etc/caddy/Caddyfile
      - run: docker compose --env-file .env.lightsail.example build
        env: { APP_ENV_FILE: .env.lightsail.example }
